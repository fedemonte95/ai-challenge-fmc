AWSTemplateFormatVersion: "2010-09-09"
Description: Intentionally insecure sample for guardrail tests

Resources:
  PublicBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: insecure-demo-bucket
      AccessControl: PublicRead

  BadSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: SSH open to the world
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
